kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: {{ APP_NAME }}
  namespace: teamdokumenthandtering
  labels:
    team: teamdokumenthandtering
  annotations:
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ ALTINN_IP_ADDRESS_WHITELIST }}
spec:
  image: {{ image }}
  ingresses:
    {{#each INGRESSES}}
       - {{ this }}
           {{/each}}
  envFrom:
    - secret: {{ DOKDIGDIRHENDELSER_SECRET }}
  env:
    - name: JAVA_TRUSTSTORE_OPTIONS
      value: "-Djavax.net.ssl.trustStore=$(NAV_TRUSTSTORE_PATH)
              -Djavax.net.ssl.trustStorePassword=$(NAV_TRUSTSTORE_PASSWORD)"
    - name: JDK_JAVA_OPTIONS
      value: "-XX:MaxRAMPercentage=75
              --enable-native-access=ALL-UNNAMED
              $(JAVA_TRUSTSTORE_OPTIONS)"
    - name: DOKDIGDIRHENDELSER_TOPICS_ALTINN_MELDING_HENDELSE
      value: {{ DOKDIGDIRHENDELSER_TOPICS_ALTINN_MELDING_HENDELSE }}
    - name: OTEL_RESOURCE_ATTRIBUTES
      value: "deployment.environment.name={{ ENVIRONMENT }}"
  liveness:
    path: /actuator/health/liveness
    initialDelay: 20
  readiness:
    path: /actuator/health/readiness
    initialDelay: 20
  port: 8080
  prometheus:
    enabled: true
    path: /actuator/prometheus
  kafka:
    pool: {{ KAFKA_POOL }}
  replicas:
    min: {{ MIN_REPLICAS }}
    max: {{ MAX_REPLICAS }}
    cpuThresholdPercentage: 50
  resources:
    requests:
      cpu: 30m
      memory: 512Mi
    limits:
      memory: 1024Mi
  observability:
    autoInstrumentation:
      enabled: true
      runtime: java
    logging:
      destinations:
        - id: elastic
        - id: loki
  maskinporten:
    enabled: true
    scopes:
      consumes:
        - name: altinn:events.subscribe
        - name: altinn:serviceowner